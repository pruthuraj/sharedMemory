<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Graph</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #05050e;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      background: #0a0a14;
      border-bottom: 1px solid #1e1e2e;
      flex-shrink: 0;
      z-index: 100;
    }
    #toolbar h1 {
      font-size: 11px;
      font-weight: 700;
      color: #818cf8;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .tb-sep { width: 1px; height: 16px; background: #1e1e2e; flex-shrink: 0; }
    .ld { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #6b7280; white-space: nowrap; }
    .ld .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tb-spacer { flex: 1; min-width: 8px; }
    #status-text { font-size: 11px; color: #475569; white-space: nowrap; }
    #status-text.ok { color: #10b981; }
    #status-text.error { color: #ef4444; }

    input[type="password"] {
      background: #0f0f1e;
      border: 1px solid #1e1e2e;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 12px;
      padding: 5px 10px;
      width: 160px;
      outline: none;
    }
    input[type="password"]:focus { border-color: #6366f1; }
    input[type="password"]::placeholder { color: #2d2d44; }

    button {
      background: #12121e;
      border: 1px solid #2d2d44;
      border-radius: 6px;
      color: #94a3b8;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    button:hover:not(:disabled) { background: #2d2d44; color: #e2e8f0; }
    button.primary { background: #6366f1; border-color: #6366f1; color: #fff; }
    button.primary:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Viewport ── */
    #viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
      background-color: #05050e;
      background-image: radial-gradient(circle, #12122a 1px, transparent 1px);
      background-size: 32px 32px;
    }
    #viewport.grabbing { cursor: grabbing; }

    #scene {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }

    #edges-svg {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      overflow: visible;
    }

    /* ── Memory node cards ── */
    .mem-node {
      position: absolute;
      width: 240px;
      background: linear-gradient(135deg, #080810 0%, #0b0b14 100%);
      border-radius: 10px;
      padding: 10px 13px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .node-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .node-key-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex: 1;
    }
    .node-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .node-key {
      font-size: 12px;
      font-weight: 700;
      color: #e2e8f0;
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .node-age {
      font-size: 9px;
      flex-shrink: 0;
      margin-left: 6px;
      opacity: 0.8;
    }
    .node-summary {
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }
    .node-tags {
      margin-top: 6px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .node-tag {
      font-size: 9px;
      color: #818cf8;
      background: #818cf811;
      border: 1px solid #818cf822;
      border-radius: 4px;
      padding: 1px 6px;
    }
    .node-imp {
      margin-top: 4px;
      font-size: 9px;
      color: #475569;
    }
    .node-imp span { color: #a5b4fc; }

    /* ── Detail panel ── */
    #detail-panel {
      position: fixed;
      bottom: 16px; right: 16px;
      width: 300px;
      max-height: 400px;
      background: linear-gradient(135deg, #0f0f1e 0%, #13101f 100%);
      border: 1.5px solid #2d2d44;
      border-radius: 12px;
      box-shadow: 0 8px 40px #000000cc;
      overflow: hidden;
      display: none;
      flex-direction: column;
      z-index: 300;
    }
    #detail-panel.visible { display: flex; }
    .dp-bar { height: 3px; flex-shrink: 0; }
    .dp-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 14px 0;
      flex-shrink: 0;
    }
    .dp-label {
      font-size: 9px; font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.9;
    }
    .dp-close {
      background: transparent; border: none;
      color: #6b7280; cursor: pointer;
      font-size: 14px; padding: 0 2px; line-height: 1;
    }
    .dp-close:hover { color: #e2e8f0; background: transparent; }
    .dp-body {
      padding: 8px 14px 14px;
      overflow-y: auto;
      flex: 1;
    }
    .dp-key {
      font-size: 14px; font-weight: 700;
      color: #e2e8f0; font-family: monospace;
      margin-bottom: 4px; word-break: break-all;
    }
    .dp-ts { font-size: 10px; margin-bottom: 10px; }
    .dp-value {
      font-size: 11px; color: #94a3b8;
      line-height: 1.65;
      background: #ffffff06;
      border: 1px solid #ffffff0f;
      border-radius: 7px;
      padding: 9px 11px;
      word-break: break-word;
      white-space: pre-wrap;
      margin-bottom: 10px;
      max-height: 110px;
      overflow-y: auto;
    }
    .dp-row {
      display: flex; gap: 6px;
      margin-bottom: 4px; font-size: 11px;
    }
    .dp-rl { color: #475569; min-width: 72px; flex-shrink: 0; }
    .dp-rv { color: #94a3b8; word-break: break-word; }
    .dp-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .dp-tag {
      font-size: 10px; color: #818cf8;
      background: #818cf811;
      border: 1px solid #818cf822;
      border-radius: 4px; padding: 2px 7px;
    }

    /* ── Controls overlay ── */
    #controls {
      position: fixed;
      bottom: 16px; left: 16px;
      display: flex; flex-direction: column;
      gap: 4px; z-index: 300;
    }
    #controls button {
      width: 28px; height: 28px;
      padding: 0; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Empty state ── */
    #empty-state {
      display: none;
      position: absolute; inset: 0;
      align-items: center; justify-content: center;
      flex-direction: column;
      pointer-events: none; z-index: 10;
    }
    #empty-state.visible { display: flex; }
    .es-icon { font-size: 38px; margin-bottom: 14px; }
    .es-title { font-size: 14px; font-weight: 600; color: #6b7280; margin-bottom: 6px; }
    .es-sub { font-size: 12px; color: #374151; }

    /* ── Loading spinner ── */
    #loading {
      display: none;
      position: absolute; inset: 0;
      align-items: center; justify-content: center;
      background: #05050ecc; z-index: 200;
    }
    #loading.visible { display: flex; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid #1e1e2e;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>Memory Graph</h1>
  <div class="tb-sep"></div>
  <div class="ld" id="ld-nodes"><span class="dot" style="background:#10b981"></span><span>—</span></div>
  <div class="ld" id="ld-edges"><span class="dot" style="background:#6366f1"></span><span>—</span></div>
  <div class="tb-spacer"></div>
  <span id="status-text">Not connected</span>
  <input type="password" id="token-input" placeholder="Token (optional)" autocomplete="off" />
  <button class="primary" id="connect-btn">Connect</button>
  <button id="refresh-btn" disabled>Refresh</button>
  <button id="fullscreen-btn" title="Fullscreen">⛶</button>
</div>

<div id="viewport">
  <div id="scene">
    <svg id="edges-svg"></svg>
  </div>
  <div id="empty-state">
    <div class="es-icon">🧠</div>
    <div class="es-title">No memory entries</div>
    <div class="es-sub">Connect and add entries to see the graph.</div>
  </div>
  <div id="loading"><div class="spinner"></div></div>
</div>

<div id="detail-panel">
  <div class="dp-bar" id="dp-bar"></div>
  <div class="dp-header">
    <div class="dp-label" id="dp-label">Memory Entry</div>
    <button class="dp-close" id="dp-close">✕</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

<div id="controls">
  <button id="zoom-in-btn" title="Zoom in">+</button>
  <button id="zoom-out-btn" title="Zoom out">−</button>
  <button id="fit-btn" title="Fit view">⊡</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────────────
const NODE_W = 240;

const RELATION_COLORS = {
  related_to:   '#6366f1',
  depends_on:   '#f59e0b',
  supports:     '#22c55e',
  contradicts:  '#ef4444',
  mentions:     '#06b6d4',
  derived_from: '#a855f7',
  next_step:    '#f97316',
};

// ── State ──────────────────────────────────────────────────────────────
let ws = null;
let currentEntries = {};
let currentEdges = [];
let nodePositions = {};
let scale = 1, panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPanX = 0, panStartPanY = 0;
let selectedKey = null;
const pending = {};
const msgQueue = [];

// ── DOM refs ───────────────────────────────────────────────────────────
const viewport    = document.getElementById('viewport');
const scene       = document.getElementById('scene');
const edgesSvg    = document.getElementById('edges-svg');
const detailPanel = document.getElementById('detail-panel');
const tokenInput  = document.getElementById('token-input');
const connectBtn  = document.getElementById('connect-btn');
const refreshBtn  = document.getElementById('refresh-btn');
const statusText  = document.getElementById('status-text');
const emptyState  = document.getElementById('empty-state');
const loadingEl   = document.getElementById('loading');

// ── Helpers ────────────────────────────────────────────────────────────
function esc(v) {
  return String(v ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function ageColor(ts) {
  const ms = Date.now() - ts;
  if (ms < 3_600_000)  return '#10b981';
  if (ms < 86_400_000) return '#6366f1';
  return '#475569';
}

function ageLabel(ts) {
  const ms = Date.now() - ts;
  if (ms < 60_000)      return 'just now';
  if (ms < 3_600_000)   return `${Math.floor(ms / 60_000)}m ago`;
  if (ms < 86_400_000)  return `${Math.floor(ms / 3_600_000)}h ago`;
  return `${Math.floor(ms / 86_400_000)}d ago`;
}

function setStatus(msg, cls = '') {
  statusText.textContent = msg;
  statusText.className = cls;
}

function nodeHeight(entry) {
  let h = 62;
  if (entry.tags && entry.tags.length) h += 22;
  if (entry.importance > 0) h += 18;
  return h;
}

function svgEl(tag) {
  return document.createElementNS('http://www.w3.org/2000/svg', tag);
}

// ── Layout ─────────────────────────────────────────────────────────────
function computeLayout(entries, edges) {
  const g = new dagre.graphlib.Graph({ multigraph: true });
  g.setGraph({ rankdir: 'LR', ranksep: 90, nodesep: 20, marginx: 60, marginy: 60 });
  g.setDefaultEdgeLabel(() => ({}));

  for (const [key, entry] of Object.entries(entries)) {
    g.setNode(key, { width: NODE_W, height: nodeHeight(entry) });
  }

  const seen = new Set();
  for (const edge of edges) {
    if (!entries[edge.from] || !entries[edge.to]) continue;
    const id = `${edge.from}||${edge.relation}||${edge.to}`;
    if (seen.has(id)) continue;
    seen.add(id);
    g.setEdge(edge.from, edge.to, {}, id);
  }

  dagre.layout(g);

  const positions = {};
  for (const key of g.nodes()) {
    const n = g.node(key);
    if (n) positions[key] = { x: n.x - n.width / 2, y: n.y - n.height / 2, w: n.width, h: n.height };
  }
  return positions;
}

// ── Node rendering ─────────────────────────────────────────────────────
function buildNodeEl(key, entry, pos) {
  const color = ageColor(entry.updatedAt);

  const div = document.createElement('div');
  div.className = 'mem-node';
  div.dataset.key = key;
  div.style.cssText = `left:${pos.x}px;top:${pos.y}px;border:1.5px solid ${color}44;box-shadow:0 2px 14px #00000055;`;

  const tagsHtml = entry.tags && entry.tags.length
    ? `<div class="node-tags">${entry.tags.map(t => `<span class="node-tag">${esc(t)}</span>`).join('')}</div>`
    : '';

  const impHtml = entry.importance > 0
    ? `<div class="node-imp">importance <span>${entry.importance}</span>/10</div>`
    : '';

  div.innerHTML = `
    <div class="node-header">
      <div class="node-key-row">
        <span class="node-dot" style="background:${color};box-shadow:0 0 6px ${color}"></span>
        <div class="node-key">${esc(key)}</div>
      </div>
      <div class="node-age" style="color:${color}">${ageLabel(entry.updatedAt)}</div>
    </div>
    <div class="node-summary">${esc(entry.summary || '')}</div>
    ${tagsHtml}${impHtml}`;

  div.addEventListener('click', e => { e.stopPropagation(); openDetail(key, entry); });
  div.addEventListener('mouseenter', () => {
    if (selectedKey !== key) {
      div.style.borderColor = `${color}99`;
      div.style.boxShadow = `0 0 0 1px ${color}22, 0 4px 20px #00000077`;
    }
  });
  div.addEventListener('mouseleave', () => {
    if (selectedKey !== key) {
      div.style.borderColor = `${color}44`;
      div.style.boxShadow = '0 2px 14px #00000055';
    }
  });

  return div;
}

// ── Edge rendering ─────────────────────────────────────────────────────
function renderEdges(edges, positions, entries) {
  while (edgesSvg.firstChild) edgesSvg.removeChild(edgesSvg.firstChild);

  // Arrow markers
  const defs = svgEl('defs');
  for (const [rel, color] of Object.entries(RELATION_COLORS)) {
    const m = svgEl('marker');
    m.setAttribute('id', `arr-${rel}`);
    m.setAttribute('markerWidth', '8');
    m.setAttribute('markerHeight', '6');
    m.setAttribute('refX', '7');
    m.setAttribute('refY', '3');
    m.setAttribute('orient', 'auto');
    const poly = svgEl('polygon');
    poly.setAttribute('points', '0 0, 8 3, 0 6');
    poly.setAttribute('fill', color);
    poly.setAttribute('opacity', '0.75');
    m.appendChild(poly);
    defs.appendChild(m);
  }
  edgesSvg.appendChild(defs);

  for (const edge of edges) {
    const sp = positions[edge.from];
    const tp = positions[edge.to];
    if (!sp || !tp) continue;

    const color = RELATION_COLORS[edge.relation] || '#6366f1';
    const sw = (1.5 + (edge.weight || 0) * 2.5).toFixed(2);

    const sx = sp.x + sp.w;
    const sy = sp.y + sp.h / 2;
    const tx = tp.x;
    const ty = tp.y + tp.h / 2;
    const dx = Math.max(Math.abs(tx - sx) * 0.45, 48);
    const d = `M ${sx} ${sy} C ${sx + dx} ${sy} ${tx - dx} ${ty} ${tx} ${ty}`;

    const g = svgEl('g');

    const path = svgEl('path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', sw);
    path.setAttribute('stroke-opacity', '0.6');
    path.setAttribute('marker-end', `url(#arr-${edge.relation})`);
    g.appendChild(path);

    // Label at bezier midpoint
    const mx = (sx + tx) / 2;
    const my = (sy + ty) / 2;

    const bg = svgEl('rect');
    bg.setAttribute('x', String(mx - 38));
    bg.setAttribute('y', String(my - 9));
    bg.setAttribute('width', '76');
    bg.setAttribute('height', '14');
    bg.setAttribute('rx', '3');
    bg.setAttribute('fill', '#05050e');
    bg.setAttribute('opacity', '0.88');
    g.appendChild(bg);

    const lbl = svgEl('text');
    lbl.setAttribute('x', String(mx));
    lbl.setAttribute('y', String(my + 1));
    lbl.setAttribute('text-anchor', 'middle');
    lbl.setAttribute('dominant-baseline', 'middle');
    lbl.setAttribute('font-size', '9');
    lbl.setAttribute('fill', color);
    lbl.setAttribute('font-family', 'system-ui, sans-serif');
    lbl.setAttribute('opacity', '0.9');
    lbl.textContent = edge.relation.replace(/_/g, ' ');
    g.appendChild(lbl);

    edgesSvg.appendChild(g);
  }
}

// ── Graph render ───────────────────────────────────────────────────────
function renderGraph(entries, edges) {
  for (const el of scene.querySelectorAll('.mem-node')) el.remove();
  selectedKey = null;
  detailPanel.classList.remove('visible');

  const keys = Object.keys(entries);
  emptyState.classList.toggle('visible', keys.length === 0);
  document.getElementById('ld-nodes').querySelector('span:last-child').textContent =
    `${keys.length} ${keys.length === 1 ? 'node' : 'nodes'}`;
  document.getElementById('ld-edges').querySelector('span:last-child').textContent =
    `${edges.length} ${edges.length === 1 ? 'edge' : 'edges'}`;

  if (!keys.length) { nodePositions = {}; return; }

  const positions = computeLayout(entries, edges);
  nodePositions = positions;

  // SVG size
  let maxX = 0, maxY = 0;
  for (const p of Object.values(positions)) {
    maxX = Math.max(maxX, p.x + p.w);
    maxY = Math.max(maxY, p.y + p.h);
  }
  edgesSvg.setAttribute('width', maxX + 80);
  edgesSvg.setAttribute('height', maxY + 80);

  renderEdges(edges, positions, entries);

  for (const [key, entry] of Object.entries(entries)) {
    if (positions[key]) scene.appendChild(buildNodeEl(key, entry, positions[key]));
  }

  fitView(positions);
}

// ── Detail panel ───────────────────────────────────────────────────────
function openDetail(key, entry) {
  // Deselect previous
  if (selectedKey) {
    const prev = scene.querySelector(`[data-key="${CSS.escape(selectedKey)}"]`);
    if (prev) {
      const c = ageColor(currentEntries[selectedKey]?.updatedAt || 0);
      prev.style.borderColor = `${c}44`;
      prev.style.boxShadow = '0 2px 14px #00000055';
    }
  }

  selectedKey = key;
  const color = ageColor(entry.updatedAt);

  const nodeEl = scene.querySelector(`[data-key="${CSS.escape(key)}"]`);
  if (nodeEl) {
    nodeEl.style.borderColor = color;
    nodeEl.style.boxShadow = `0 0 0 3px ${color}33, 0 4px 24px #00000077`;
  }

  document.getElementById('dp-bar').style.background = `linear-gradient(90deg, ${color}, ${color}44)`;
  document.getElementById('dp-label').style.color = color;
  document.getElementById('dp-label').textContent = 'Memory Entry';
  detailPanel.style.borderColor = `${color}44`;

  const val = typeof entry.value === 'object'
    ? JSON.stringify(entry.value, null, 2)
    : String(entry.value ?? '');

  const tagsHtml = entry.tags && entry.tags.length
    ? `<div class="dp-tags">${entry.tags.map(t => `<span class="dp-tag">${esc(t)}</span>`).join('')}</div>`
    : '<span style="color:#374151">—</span>';

  const date = entry.updatedAt ? new Date(entry.updatedAt).toLocaleString() : '—';
  const age  = entry.updatedAt ? ageLabel(entry.updatedAt) : '';
  const exp  = entry.expiresAt
    ? `<div class="dp-row"><span class="dp-rl">Expires</span><span class="dp-rv" style="color:#f59e0b">${new Date(entry.expiresAt).toLocaleString()}</span></div>`
    : '';

  document.getElementById('dp-body').innerHTML = `
    <div class="dp-key">${esc(key)}</div>
    <div class="dp-ts" style="color:${color}">${esc(date)}${age ? ` · ${esc(age)}` : ''}</div>
    <div class="dp-value">${esc(val)}</div>
    <div class="dp-row"><span class="dp-rl">Summary</span><span class="dp-rv">${esc(entry.summary || '—')}</span></div>
    <div class="dp-row"><span class="dp-rl">Tags</span><span class="dp-rv">${tagsHtml}</span></div>
    <div class="dp-row"><span class="dp-rl">Importance</span><span class="dp-rv" style="color:#a5b4fc">${entry.importance ?? '—'}</span></div>
    <div class="dp-row"><span class="dp-rl">Revision</span><span class="dp-rv">${entry.revision ?? '—'}</span></div>
    <div class="dp-row"><span class="dp-rl">Updated by</span><span class="dp-rv">${esc(entry.updatedBy || '—')}</span></div>
    ${exp}`;

  detailPanel.classList.add('visible');
}

document.getElementById('dp-close').addEventListener('click', () => {
  if (selectedKey) {
    const el = scene.querySelector(`[data-key="${CSS.escape(selectedKey)}"]`);
    if (el) {
      const c = ageColor(currentEntries[selectedKey]?.updatedAt || 0);
      el.style.borderColor = `${c}44`;
      el.style.boxShadow = '0 2px 14px #00000055';
    }
  }
  selectedKey = null;
  detailPanel.classList.remove('visible');
});

viewport.addEventListener('click', e => {
  if (e.target === viewport || e.target === scene || e.target === edgesSvg) {
    document.getElementById('dp-close').click();
  }
});

// ── Pan / zoom ─────────────────────────────────────────────────────────
function applyTransform() {
  scene.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
  viewport.style.backgroundSize = `${32 * scale}px ${32 * scale}px`;
  viewport.style.backgroundPosition = `${panX}px ${panY}px`;
}

function fitView(positions) {
  const keys = Object.keys(positions);
  if (!keys.length) return;
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of Object.values(positions)) {
    minX = Math.min(minX, p.x);          minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x + p.w);    maxY = Math.max(maxY, p.y + p.h);
  }

  const pad = 60;
  scale = Math.max(0.08, Math.min(1.2,
    Math.min((vw - pad * 2) / (maxX - minX), (vh - pad * 2) / (maxY - minY))
  ));
  panX = (vw - (maxX - minX) * scale) / 2 - minX * scale;
  panY = (vh - (maxY - minY) * scale) / 2 - minY * scale;
  applyTransform();
}

viewport.addEventListener('mousedown', e => {
  if (e.target.closest('.mem-node')) return;
  isPanning = true;
  panStartX = e.clientX; panStartY = e.clientY;
  panStartPanX = panX;   panStartPanY = panY;
  viewport.classList.add('grabbing');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  panX = panStartPanX + (e.clientX - panStartX);
  panY = panStartPanY + (e.clientY - panStartY);
  applyTransform();
});
document.addEventListener('mouseup', () => {
  if (isPanning) { isPanning = false; viewport.classList.remove('grabbing'); }
});
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newScale = Math.max(0.08, Math.min(3, scale * factor));
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const sx = (mx - panX) / scale, sy = (my - panY) / scale;
  scale = newScale;
  panX = mx - sx * scale; panY = my - sy * scale;
  applyTransform();
}, { passive: false });

document.getElementById('zoom-in-btn').addEventListener('click', () => {
  const cx = viewport.clientWidth / 2, cy = viewport.clientHeight / 2;
  const sx = (cx - panX) / scale, sy = (cy - panY) / scale;
  scale = Math.min(3, scale * 1.2);
  panX = cx - sx * scale; panY = cy - sy * scale;
  applyTransform();
});
document.getElementById('zoom-out-btn').addEventListener('click', () => {
  const cx = viewport.clientWidth / 2, cy = viewport.clientHeight / 2;
  const sx = (cx - panX) / scale, sy = (cy - panY) / scale;
  scale = Math.max(0.08, scale / 1.2);
  panX = cx - sx * scale; panY = cy - sy * scale;
  applyTransform();
});
document.getElementById('fit-btn').addEventListener('click', () => fitView(nodePositions));
document.getElementById('fullscreen-btn').addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
  else document.exitFullscreen().catch(() => {});
});
document.addEventListener('fullscreenchange', () => {
  document.getElementById('fullscreen-btn').textContent = document.fullscreenElement ? '⊠' : '⛶';
  setTimeout(() => fitView(nodePositions), 80);
});

// ── WebSocket ──────────────────────────────────────────────────────────
function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function wsRpc(obj) {
  return new Promise(res => { pending[obj.requestId] = res; wsSend(obj); });
}

function drainQueue(type) {
  const idx = msgQueue.findIndex(m => m.type === type);
  if (idx !== -1) return msgQueue.splice(idx, 1)[0];
  return null;
}

async function connect() {
  const token = tokenInput.value.trim();
  connectBtn.disabled = true;
  setStatus('Connecting…');

  if (ws) { try { ws.close(); } catch {} ws = null; }
  msgQueue.length = 0;

  ws = new WebSocket(`ws://${location.host}/`);

  ws.onmessage = e => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.requestId && pending[msg.requestId]) {
      const res = pending[msg.requestId];
      delete pending[msg.requestId];
      res(msg);
    } else if (!msg.requestId) {
      if (pending[`__${msg.type}__`]) {
        const res = pending[`__${msg.type}__`];
        delete pending[`__${msg.type}__`];
        res(msg);
      } else {
        msgQueue.push(msg);
      }
    }
  };

  ws.onerror = () => { setStatus('Connection failed', 'error'); connectBtn.disabled = false; };
  ws.onclose = () => { setStatus('Disconnected', 'error'); connectBtn.disabled = false; refreshBtn.disabled = true; };

  const opened = await new Promise(res => { ws.onopen = () => res(true); ws.onerror = () => res(false); });
  if (!opened || ws.readyState !== WebSocket.OPEN) { connectBtn.disabled = false; return; }

  // Welcome (no requestId — may already be queued)
  const welcome = drainQueue('welcome') || await new Promise(res => { pending['__welcome__'] = res; });
  if (!welcome || welcome.type !== 'welcome') {
    setStatus('Bad server response', 'error'); connectBtn.disabled = false; return;
  }

  if (token) {
    const r = await wsRpc({ type: 'auth', token, requestId: '__auth__' });
    if (r.type === 'error') {
      setStatus('Auth failed', 'error'); ws.close(); connectBtn.disabled = false; return;
    }
  }

  refreshBtn.disabled = false;
  connectBtn.disabled = false;
  await loadGraph();
}

async function loadGraph() {
  loadingEl.classList.add('visible');
  setStatus('Loading…');

  const r = await wsRpc({ type: 'export', requestId: '__export__' });
  loadingEl.classList.remove('visible');

  if (r.type === 'error') { setStatus('Export failed', 'error'); return; }

  currentEntries = r.snapshot.entries;
  currentEdges   = r.snapshot.edges;
  renderGraph(currentEntries, currentEdges);

  const nc = Object.keys(currentEntries).length;
  const ec = currentEdges.length;
  setStatus(`${nc} nodes · ${ec} edges`, 'ok');
}

connectBtn.addEventListener('click', connect);
refreshBtn.addEventListener('click', loadGraph);
tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });

applyTransform();
</script>
